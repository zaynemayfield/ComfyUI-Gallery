name: Bug report
description: Report a problem with ComfyUI Gallery
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the issue and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Gallery
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Gallery version or commit
      placeholder: "Example: 2.8.0 or commit hash"
  - type: input
    id: comfyui
    attributes:
      label: ComfyUI version
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: "Example: Chrome on Windows 11"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste logs or attach screenshots/video if useful.
